[railway]
  plugin = "python"

[build]
  builder = "python"
  pythonVersion = "311"

[deploy]
  startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
  healthCheckPath = "/"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[deploy.variables]
  PORT = "8000"
  ENVIRONMENT = "production"
  DEBUG = "false"

[[build]]
  label = "Backend"
  lastBuiltCommit = ""